<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Debug Mode</title>
    <!-- 라이브러리 로드 확인을 위해 상단 배치 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <h1>디버깅 페이지</h1>
    <div id="content" style="background: #eee; padding: 10px;">대기 중...</div>

    <script>
        // 1. 스크립트 로드 즉시 실행 확인
        console.log("1. 스크립트가 로드되었습니다.");

        async function init() {
            console.log("2. init 함수가 시작되었습니다.");
            const contentDiv = document.getElementById('content');

            try {
                console.log("3. fetch를 시도합니다...");
                // 경로를 상대 경로로 명확히 지정
                const res = await fetch('./README.md');
                
                console.log("4. 응답 상태:", res.status);
                if (!res.ok) throw new Error("파일을 못 찾음 (404)");

                const md = await res.text();
                console.log("5. 데이터 수신 완료 (길이):", md.length);

                // 라이브러리 작동 확인
                if (typeof marked !== 'undefined') {
                    contentDiv.innerHTML = marked.parse(md);
                    console.log("6. 렌더링 성공!");
                } else {
                    console.error("Marked 라이브러리가 로드되지 않았습니다.");
                    contentDiv.innerText = md; // 텍스트라도 출력
                }

            } catch (err) {
                console.error("7. 에러 발생:", err);
                contentDiv.innerHTML = "에러: " + err.message;
            }
        }

        // DOM이 준비되면 실행
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
