<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아침 증시 브리핑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="brief.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body>

<header>
  <div class="date-nav">
    <button id="btn-prev" class="nav-btn" title="이전 영업일">&#9664;</button>
    <span id="current-date" class="date-label">―</span>
    <button id="btn-next" class="nav-btn" title="다음 영업일">&#9654;</button>
  </div>
</header>

<div id="stale-bar" hidden></div>

<main>
  <div id="loading" class="loading-msg">데이터 로딩 중…</div>
  <div id="error-msg" class="error-msg" style="display:none"></div>
  <section id="sec-main"></section>
</main>

<script>
'use strict';

marked.setOptions({ breaks: true, gfm: true });

/* ── 이전 데이터 경고 바 ───────────────────────────────── */
function showStaleBanner(msg) {
  const bar = document.getElementById('stale-bar');
  bar.textContent = msg;
  bar.hidden = false;
}
function hideStaleBanner() {
  document.getElementById('stale-bar').hidden = true;
}

/* ── 날짜 유틸 ─────────────────────────────────────────── */
function kstToday() {
  const d = new Date(Date.now() + 9 * 3600 * 1000);
  return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
}
function isWeekend(d) { const day = d.getUTCDay(); return day === 0 || day === 6; }
function prevBiz(d) {
  const r = new Date(d); r.setUTCDate(r.getUTCDate() - 1);
  while (isWeekend(r)) r.setUTCDate(r.getUTCDate() - 1);
  return r;
}
function nextBiz(d) {
  const r = new Date(d); r.setUTCDate(r.getUTCDate() + 1);
  while (isWeekend(r)) r.setUTCDate(r.getUTCDate() + 1);
  return r;
}
function fmtDate(d) {
  return `${d.getUTCFullYear()}${String(d.getUTCMonth()+1).padStart(2,'0')}${String(d.getUTCDate()).padStart(2,'0')}`;
}
function displayDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getUTCFullYear()}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${String(d.getUTCDate()).padStart(2,'0')} (${days[d.getUTCDay()]})`;
}

/* ── HTML 이스케이프 ───────────────────────────────────── */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 툴팁 엔진 ─────────────────────────────────────────── */
function initTooltips() {
  const tip = document.createElement('div');
  tip.id = 'g-tip';
  document.body.appendChild(tip);
  document.addEventListener('mousemove', e => {
    const x = e.clientX + 14, y = e.clientY + 14;
    tip.style.left = (x + 270 > window.innerWidth  ? e.clientX - 278 : x) + 'px';
    tip.style.top  = (y + 100 > window.innerHeight ? e.clientY - 108 : y) + 'px';
  });
  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tip]');
    if (el && el.dataset.tip) { tip.textContent = el.dataset.tip; tip.classList.add('show'); }
  });
  document.addEventListener('mouseout', e => {
    if (!e.relatedTarget || !e.relatedTarget.closest('[data-tip]')) tip.classList.remove('show');
  });
}

/* ── 숫자 포맷 ─────────────────────────────────────────── */
function fmtVal(v) {
  if (v == null) return '—';
  if (v >= 1000) return v.toLocaleString('ko-KR', { maximumFractionDigits: 2 });
  return parseFloat(v.toFixed(2)).toString();
}

/* ── data 경로 탐색 ────────────────────────────────────── */
function getPath(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined ? o[k] : []), obj);
}

/* ================================================================
   고정 카드 스펙 — spec 기반 파싱 (키워드 매칭 → 값 추출)
   ================================================================ */
const KR_SPECS = [
  // srcs 순서: KIS 실시간 우선, macro.global(yfinance 전일 종가)으로 주말·장마감 폴백
  { name: '코스피',    kws: ['코스피','KOSPI'],                         srcs: ['market.domestic','macro.global'],              inv: false },
  { name: '코스닥',    kws: ['코스닥','KOSDAQ'],                        srcs: ['market.domestic','macro.global'],              inv: false },
  { name: 'KOSPI200',  kws: ['코스피200','KOSPI200','200'],             srcs: ['market.domestic','macro.global'],              inv: false },
  { name: 'USD/KRW',   kws: ['USD/KRW','원달러','KRW','원/달러','달러원'], srcs: ['market.forex_rates','macro.global'],       inv: true  },
  { name: 'USD/JPY',   kws: ['USD/JPY','달러엔','엔달러','JPY'],        srcs: ['market.forex_rates','macro.global'],           inv: true  },
  { name: '국고채 10Y',kws: ['국고채','국채10','KTB','국채'],                 srcs: ['market.forex_rates','fred.standard'],  inv: true  },
];

const US_SPECS = [
  { name: 'S&P 500',   kws: ['S&P 500','S&P','SPX'],          srcs: ['market.overseas','macro.global'], inv: false },
  { name: '나스닥100', kws: ['나스닥100','나스닥','NASDAQ','NDX'], srcs: ['market.overseas','macro.global'], inv: false },
  { name: '다우존스',  kws: ['다우존스','다우','DOW','DJI'],    srcs: ['market.overseas','macro.global'], inv: false },
  { name: 'DXY',       kws: ['DXY','달러인덱스'],               srcs: ['macro.global'],                  inv: true  },
  { name: '미국 10Y',  kws: ['10년물','TNX','미국채10'],         srcs: ['macro.global'],                  inv: true  },
  { name: 'VIX',       kws: ['VIX'],                           srcs: ['macro.global'],                  inv: true  },
];

function buildCard(spec, dataJson, indicators) {
  /* 1) key_indicators 우선 (이미 파싱된 값) */
  const fromInd = (indicators || []).find(i =>
    spec.kws.some(k => (i.name || '').toLowerCase().includes(k.toLowerCase()))
  );
  if (fromInd) {
    return { name: spec.name, value: fromInd.value, change: fromInd.change,
             tag: fromInd.tag, insight: fromInd.insight || '' };
  }

  /* 2) 원본 데이터에서 키워드 검색 후 파싱 */
  for (const src of spec.srcs) {
    const items = getPath(dataJson, src);
    if (!Array.isArray(items)) continue;
    for (const it of items) {
      const t = it.title || '';
      if (!spec.kws.some(k => t.toLowerCase().includes(k.toLowerCase()))) continue;
      const valM = t.match(/[：:]\s*([\d,]+\.?\d*)/);
      const desc = it.description || '';
      const chgM = t.match(/([+-][\d.]+)%/) || desc.match(/([+-][\d.]+)%/);
      const value  = valM ? parseFloat(valM[1].replace(/,/g, '')) : null;
      const change = chgM ? parseFloat(chgM[1]) : 0;
      const tag    = change === 0 ? 'Neutral'
                   : ((change > 0) !== spec.inv) ? 'Bullish' : 'Bearish';
      return { name: spec.name, value, change, tag, insight: it.description || '' };
    }
  }

  return { name: spec.name, value: null, change: 0, tag: 'Neutral', insight: '' };
}

function renderSpecCards(specs, dataJson, indicators) {
  const cards = specs.map(s => buildCard(s, dataJson, indicators));
  return '<div class="indicator-grid">' +
    cards.map(c => {
      const dir   = c.change >= 0 ? 'pos' : 'neg';
      const arrow = c.change >= 0 ? '▲' : '▼';
      const cls   = (c.tag || 'neutral').toLowerCase();
      return `<div class="ind-card ${cls}" data-tip="${esc(c.insight)}">
        <div class="ind-name">${esc(c.name)}</div>
        <div class="ind-value">${fmtVal(c.value)}</div>
        <div class="ind-change ${dir}">${arrow}${Math.abs(c.change).toFixed(2)}%</div>
      </div>`;
    }).join('') + '</div>';
}

/* ================================================================
   시황 브리핑 (5 포인트 · 태그 · 컬러)
   ================================================================ */
const _TAG_MAP = {
  Bullish: { cls: 'bullish', label: '상승' },
  Bearish: { cls: 'bearish', label: '하락' },
  Neutral: { cls: 'neutral', label: '중립' },
};

function renderBriefing(items) {
  if (!items?.length) return '';
  return '<div class="briefing-list">' +
    items.slice(0, 5).map(it => {
      const tm = _TAG_MAP[it.tag] || _TAG_MAP.Neutral;
      return `<div class="briefing-row brief-${tm.cls}">
        <span class="brief-tag ${tm.cls}">${tm.label}</span>
        <span class="brief-point">${esc(it.point)}</span>
      </div>`;
    }).join('') + '</div>';
}

/* ================================================================
   뉴스 카드 (소스 그룹별)
   ================================================================ */
const _SRC = {
  international: { label: '해외',  color: '#388bfd' },
  domestic:      { label: '국내',  color: '#3fb950' },
  naver:         { label: 'Naver', color: '#f0883e' },
  telegram:      { label: 'TG',    color: '#a371f7' },
};
function srcBadge(it) {
  const s = _SRC[it.source] || _SRC.domestic;
  const lbl = (it.press || s.label).slice(0, 8);
  return `<span class="src-badge" style="color:${s.color};border-color:${s.color}40;background:${s.color}18">${esc(lbl)}</span>`;
}

/* cat_labels는 renderAll()에서 summaryMd.cat_labels로 교체됨 */
let _CAT_LABEL = {
  '반도체·AI':     '💻 반도체·AI',
  '매크로·금리':   '🏦 매크로·금리',
  'K-증시·수급':   '🇰🇷 K-증시·수급',
  '부동산·유동성': '💧 부동산·유동성',
  '에너지·원자재': '🛢️ 에너지·원자재',
  '시장·기타':     '📋 시장·기타',
};

function renderNewsCards(news) {
  if (!news?.length) return '';
  const filtered = news.filter(it => it.title && it.title !== 'N/A');
  if (!filtered.length) return '';

  const grouped = {};
  for (const it of filtered) {
    const cat = it.category || '시장·기타';
    (grouped[cat] = grouped[cat] || []).push(it);
  }

  return '<div class="news-grid">' +
    Object.entries(grouped).map(([cat, items]) =>
      `<div class="news-group">
        <div class="news-cat-label">${_CAT_LABEL[cat] || esc(cat)}</div>
        ${items.slice(0, 3).map(it => {
          const title = it.url
            ? `<a class="news-link" href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>`
            : `<span>${esc(it.title)}</span>`;
          return `<div class="news-item">
            ${srcBadge(it)}
            <span class="news-title">${title}</span>
          </div>`;
        }).join('')}
      </div>`
    ).join('') + '</div>';
}

/* ================================================================
   공통 렌더러
   ================================================================ */
function renderAll(dataJson, summaryMd) {
  if (summaryMd.cat_labels) _CAT_LABEL = summaryMd.cat_labels;
  const allInds = summaryMd.key_indicators || [];
  let html = '';

  /* ─── 🇰🇷 국내 ─── */
  html += '<div class="region-block">';
  html += '<div class="region-header">🇰🇷 국내 시장</div>';

  html += renderSpecCards(KR_SPECS, dataJson, allInds);

  const krBrief = renderBriefing(summaryMd.kr_briefing);
  if (krBrief) html += `<div class="section-divider"></div>${krBrief}`;

  const krNews = renderNewsCards(summaryMd.kr_news || []);
  if (krNews) html += `<div class="section-divider"></div>${krNews}`;

  html += '</div>';

  /* ─── 🌐 미국·글로벌 ─── */
  html += '<div class="region-block">';
  html += '<div class="region-header">🌐 미국·글로벌</div>';

  html += renderSpecCards(US_SPECS, dataJson, allInds);

  const usBrief = renderBriefing(summaryMd.us_briefing);
  if (usBrief) html += `<div class="section-divider"></div>${usBrief}`;

  const usNews = renderNewsCards(summaryMd.us_news || []);
  if (usNews) html += `<div class="section-divider"></div>${usNews}`;

  html += '</div>';

  document.getElementById('sec-main').innerHTML = html;
  document.getElementById('loading').style.display = 'none';
  window.scrollTo(0, 0);
}

/* ── 데이터 로딩 ───────────────────────────────────────── */
let currentDate = kstToday();
const today = kstToday();

async function loadDate(d) {
  const ds = fmtDate(d);
  document.getElementById('loading').style.display = '';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('sec-main').innerHTML = '';
  try {
    const [jRes, sRes] = await Promise.all([fetch(`${ds}_data.json`), fetch(`${ds}_summary.json`)]);
    if (!jRes.ok || !sRes.ok) throw new Error();
    renderAll(await jRes.json(), await sRes.json());
    return true;
  } catch {
    document.getElementById('loading').style.display = 'none';
    return false;
  }
}

async function loadMock() {
  try {
    const [jRes, sRes] = await Promise.all([fetch('mock_data.json'), fetch('mock_summary.json')]);
    if (!jRes.ok || !sRes.ok) return false;
    renderAll(await jRes.json(), await sRes.json());
    document.getElementById('current-date').textContent = '── MOCK ──';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    showStaleBanner('⚠️  MOCK 데이터 — 실제 브리핑 파일 없음');
    return true;
  } catch { return false; }
}

async function findAndLoad(startDate, direction) {
  let d = startDate;
  for (let i = 0; i < 30; i++) {
    if (await loadDate(d)) {
      currentDate = d;
      document.getElementById('current-date').textContent = displayDate(d);
      document.getElementById('btn-next').disabled = fmtDate(d) >= fmtDate(today);
      if (fmtDate(d) === fmtDate(today)) {
        hideStaleBanner();
      } else {
        showStaleBanner(`⚠️  이전 데이터 — ${displayDate(d)} 기준 (오늘 브리핑 미생성)`);
      }
      return;
    }
    d = direction === 'prev' ? prevBiz(d) : nextBiz(d);
  }
  document.getElementById('loading').style.display = '';
  if (!await loadMock()) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error-msg');
    el.textContent = '최근 30 영업일 내 데이터 파일이 없습니다.';
    el.style.display = '';
  }
}

document.getElementById('btn-prev').addEventListener('click', () => findAndLoad(prevBiz(currentDate), 'prev'));
document.getElementById('btn-next').addEventListener('click', () => {
  const nd = nextBiz(currentDate);
  if (fmtDate(nd) > fmtDate(today)) return;
  findAndLoad(nd, 'next');
});

initTooltips();
(async () => await findAndLoad(today, 'prev'))();
</script>
</body>
</html>
