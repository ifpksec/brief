<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief Archive</title>
    <!-- Marked.js 라이브러리 (최신 버전) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; }
        #content { border-top: 1px solid #eee; margin-top: 20px; }
        pre { background: #f6f8fa; padding: 16px; overflow: auto; border-radius: 6px; }
        code { font-family: monospace; background: #afb8c133; padding: 0.2em 0.4em; border-radius: 6px; }
    </style>
</head>
<body>
    <h1 id="title">My Briefing</h1>
    <div id="content">불러오는 중...</div>

    <script>
        async function loadMarkdown() {
            const contentDiv = document.getElementById('content');
            try {
                // 1. 상대 경로로 파일 가져오기 (./ 사용)
                // 캐시 방지를 위해 현재 시간을 쿼리 스트링으로 추가함
                const response = await fetch('./README.md?nocache=' + new Date().getTime());
                
                if (!response.ok) throw new Error('README.md 파일을 찾을 수 없습니다.');

                const text = await response.text();

                // 2. 최신 문법(marked.parse)으로 렌더링
                contentDiv.innerHTML = marked.parse(text);
                
            } catch (error) {
                contentDiv.innerHTML = `<p style="color:red"><b>에러 발생:</b> ${error.message}</p>
                <p>파일이 저장소의 'brief' 폴더 안에 <b>README.md</b>라는 이름으로 있는지 확인하세요.</p>`;
                console.error(error);
            }
        }

        // 페이지 로드 완료 후 실행
        window.onload = loadMarkdown;
    </script>
</body>
</html>
